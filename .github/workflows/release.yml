name: Release docs

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Compile document
        run: typst compile --font-path fonts main.typ junior_swe_interview_prep.pdf

      - name: Get commit message
        id: commit
        run: echo "subject=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: docs-v${{ github.run_number }}
          name: ${{ steps.commit.outputs.subject }}
          body: |
            Automated docs release for commit ${{ github.sha }}.
          files: junior_swe_interview_prep.pdf
